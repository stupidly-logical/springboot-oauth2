# =============================================================================
# Development profile overrides — applied when spring.profiles.active=dev
# =============================================================================

# Verbose SQL logging for local development
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true

# Spring AS + JDBC trace logging to debug token introspection active:false
# Shows every SQL statement JdbcTemplate executes (save & find queries)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# Shows parameter values bound to each statement (needed to confirm token bytes)
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
# Shows Spring AS provider-level flow (findByToken result, isActive checks)
logging.level.org.springframework.security.oauth2.server.authorization=TRACE
