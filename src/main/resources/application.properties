# =============================================================================
# OAuth2 Authorization Server Configuration
# =============================================================================

# Server Configuration
server.port=${SERVER_PORT:9000}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/}
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:always}

# Application Information
spring.application.name=OAuth2 Authorization Server
info.app.name=${spring.application.name}
info.app.description=Spring Boot OAuth2 Authorization Server

# =============================================================================
# Database Configuration
# =============================================================================

# Development Database (H2)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:authdb}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}
spring.h2.console.settings.web-allow-others=${H2_CONSOLE_WEB_ALLOW_OTHERS:false}

# =============================================================================
# JPA/Hibernate Configuration
# =============================================================================

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.use_sql_comments=${JPA_USE_SQL_COMMENTS:true}

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:20000}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}

# =============================================================================
# Logging Configuration
# =============================================================================

# Root logging level
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}

# Spring Security logging (set to INFO in production)
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY:DEBUG}
logging.level.org.springframework.security.oauth2=${LOGGING_LEVEL_OAUTH2:DEBUG}

# Application logging
logging.level.com.example=${LOGGING_LEVEL_APP:DEBUG}

# HTTP requests logging (disable in production)
logging.level.org.springframework.web=${LOGGING_LEVEL_WEB:INFO}

# Database logging (set to DEBUG/TRACE in application-dev.properties)
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_SQL_PARAMS:WARN}

# Console logging pattern
logging.pattern.console=${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}

# =============================================================================
# Actuator Configuration
# =============================================================================

# Endpoints to expose
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:when-authorized}
management.endpoint.health.show-components=${ACTUATOR_HEALTH_SHOW_COMPONENTS:when-authorized}

# Actuator security
management.endpoints.web.base-path=${ACTUATOR_BASE_PATH:/actuator}

# Health indicators
management.health.db.enabled=${ACTUATOR_HEALTH_DB:true}
management.health.diskspace.enabled=${ACTUATOR_HEALTH_DISK:true}

